<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>善之大地 Land of Kindness</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3498db;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <header class="bg-green-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">🌱 善之大地 <span class="text-xs bg-green-700 px-2 py-1 rounded">25春001班</span></h1>
        <div id="userStatus" class="hidden text-base flex items-center gap-2">
            <span id="navNickname" class="font-semibold"></span> <span class="bg-green-800/50 px-3 py-1 rounded-full text-sm">(個人總分: <span id="navScore" class="text-yellow-300 font-extrabold text-lg tracking-wide">0</span> 分)</span>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-xs px-2 py-1 rounded transition ml-1">登出</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="globalStatus" class="bg-white p-6 rounded-xl shadow-md text-center my-8 max-w-md mx-auto">
            <div id="statusIcon" class="flex justify-center mb-3"><div class="loading-spinner"></div></div>
            <p id="statusMessage" class="text-gray-600 font-medium">正在連線至善之大地資料庫...</p>
        </div>

        <section id="authSection" class="hidden max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl my-8">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">建立角色 / 登入</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">使用者帳號</label>
                    <input type="text" id="username" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="請輸入英文或數字">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="請輸入密碼">
                </div>
                <hr class="border-gray-200 my-4">
                <p class="text-xs text-gray-400 text-center">💡 初次登入將自動以此資料創立新角色</p>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">遊戲暱稱 (新創角必填)</label>
                    <input type="text" id="nickname" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="例如：隨喜功德小行者">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">性別</label>
                    <select id="gender" class="w-full px-3 py-2 border rounded-lg outline-none">
                        <option value="師兄">師兄</option>
                        <option value="師姐">師姐</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <button onclick="handleAuth()" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg shadow-md mt-2">
                    進入善之大地 🚀
                </button>
            </div>
        </section>

        <section id="gameSection" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6 my-4">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-md text-center">
                    <h3 class="text-lg font-bold text-gray-700 mb-2">我的善意家園</h3>
                    
                    <div class="flex justify-center my-4 h-44 items-center">
                        <div id="landStageVisual" class="w-full h-full flex items-center justify-center"></div>
                    </div>
                    
                    <p class="text-sm text-gray-500">目前等級：<span id="landLevelName" class="font-extrabold text-orange-600 text-base">功德萌芽幼苗 (0 分)</span></p>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h3 class="text-lg font-bold text-gray-700 mb-4">✍️ 每日造集資糧功德回報</h3>
                    
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4 text-center">
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="廣論班上課" checked onclick="updateScoreHint(2)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">📖</div>
                            <p class="font-semibold text-xs">廣論班上課</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+2 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="每日善行" onclick="updateScoreHint(3)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">☀️</div>
                            <p class="font-semibold text-xs">每日善行</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+3 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="誦經" onclick="updateScoreHint(3)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">🙏</div>
                            <p class="font-semibold text-xs">誦經</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+3 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="聽音檔" onclick="updateScoreHint(3)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">🎧</div>
                            <p class="font-semibold text-xs">聽音檔</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+3 分</p>
                        </label>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4 text-center">
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="觀功" onclick="updateScoreHint(5)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">🔍</div>
                            <p class="font-semibold text-xs">觀功</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+5 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="念恩" onclick="updateScoreHint(5)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">❤️</div>
                            <p class="font-semibold text-xs">念恩</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+5 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="當義工" onclick="updateScoreHint(8)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">🧡</div>
                            <p class="font-semibold text-xs">當義工</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+8 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="參加法會" onclick="updateScoreHint(8)" class="absolute top-2 left-2">
                            <div class="text-xl mb-1">📿</div>
                            <p class="font-semibold text-xs">參加法會</p>
                            <p class="text-xs text-green-600 font-black mt-0.5">+8 分</p>
                        </label>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-600 mb-1">善行具體描述</label>
                        <textarea id="kindnessDesc" rows="3" class="w-full px-3 py-2 border rounded-lg outline-none text-sm" placeholder="填寫做了什麼好事..."></textarea>
                    </div>
                    <button id="btnSubmitKindness" onclick="submitKindness()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md transition text-base">
                        送出善行，灌溉大地 ✨ (<span id="btnScoreHint" class="text-yellow-300 font-black text-lg">+2</span>分)
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md flex flex-col max-h-[600px]">
                <h3 class="text-lg font-bold text-gray-700 mb-3">📜 善行歷史回顧日誌</h3>
                <div id="logContainer" class="space-y-3 overflow-y-auto flex-1 pr-1 text-sm">
                    <p class="text-gray-400 text-center py-8">目前尚無行善紀錄。</p>
                </div>
            </div>
        </section>

        <section id="leaderboardSection" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 my-8">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-md">
                <h3 class="text-xl font-bold text-gray-800 mb-4">🌍 善意家園世界（我的鄰居們）</h3>
                <div id="worldContainer" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h3 class="text-xl font-bold text-gray-800 mb-4">👑 功德資糧排行榜</h3>
                <div id="leaderboardContainer" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBeHqFPnUEiRbkIF2U8j4NVWQ96nUDGLDGyFNicaR3AC54DH_EBzI8sKPddz8vulgJyQ/exec";
        
        let allUsersData = {};
        let currentUser = null;
        let isSubmitting = false; 

        const STAGE_CONFIG = [
            { minScore: 3000, name: "無上圓滿佛淨土", file: "stage10.png" },
            { minScore: 2000, name: "極樂金光明寶園", file: "stage9.png" },
            { minScore: 1500, name: "兜率內院大庇護所", file: "stage8.png" },
            { minScore: 1100, name: "天空摩尼梵宇寺", file: "stage7.png" },
            { minScore: 800,  name: "福德善意黃金寶堡", file: "stage6.png" },
            { minScore: 550,  name: "華麗福報摩登莊園", file: "stage5.png" },
            { minScore: 350,  name: "慈悲福慧豐收家園", file: "stage4.png" },
            { minScore: 200,  name: "隨喜善念茂盛灌木", file: "stage3.png" },
            { minScore: 100,  name: "菩提清淨小綠植株", file: "stage2.png" },
            { minScore: 0,    name: "功德萌芽初始幼苗", file: "stage1.png" }
        ];

        function getStageInfo(score) {
            const currentScore = score > 9999 ? 9999 : score;
            for (let stage of STAGE_CONFIG) {
                if (currentScore >= stage.minScore) return stage;
            }
            return STAGE_CONFIG[STAGE_CONFIG.length - 1];
        }

        window.onload = function() {
            fetchDatabase();
        };

        function fetchDatabase() {
            showGlobalStatus(true, "正在連線至善之大地資料庫...");
            
            const callbackName = "jsonpCallback_" + Date.now();
            window[callbackName] = function(data) {
                if(data.result === "success") {
                    allUsersData = data.users || {};
                    showGlobalStatus(false);
                    const savedUser = localStorage.getItem("kindness_user");
                    if(savedUser && allUsersData[savedUser]) {
                        loginAs(savedUser);
                    } else {
                        document.getElementById("authSection").classList.remove("hidden");
                        document.getElementById("leaderboardSection").classList.add("hidden");
                    }
                } else {
                    showGlobalStatus(true, "⚠️ 載入資料庫失敗！", "❌");
                }
                document.getElementById(callbackName).remove();
                delete window[callbackName];
            };

            const script = document.createElement("script");
            script.id = callbackName;
            script.src = `${SCRIPT_URL}?action=getAllUsers&callback=${callbackName}&_nocache=${Date.now()}`;
            document.body.appendChild(script);
        }

        function handleAuth() {
            const user = document.getElementById("username").value.trim().toLowerCase();
            const pass = document.getElementById("password").value.trim();
            const nick = document.getElementById("nickname").value.trim();
            const gen = document.getElementById("gender").value;

            if(!user || !pass) { alert("請填寫帳號與密碼！"); return; }

            if(allUsersData[user]) {
                if(allUsersData[user].password === pass) {
                    loginAs(user);
                } else {
                    alert("密碼錯誤！");
                }
            } else {
                if(!nick) { alert("新角色請填寫遊戲暱稱！"); return; }
                showGlobalStatus(true, "正在建立角色...");
                
                const callbackName = "jsonpRegister_" + Date.now();
                window[callbackName] = function(data) {
                    if(data.result === "success") {
                        alert("🎉 創角成功！歡迎來到善之大地！");
                        localStorage.setItem("kindness_user", user);
                        location.reload();
                    } else {
                        alert("註冊失敗：" + data.message);
                        showGlobalStatus(false);
                    }
                    document.getElementById(callbackName).remove();
                    delete window[callbackName];
                };

                const newUserData = { username: user, password: pass, nickname: nick, gender: gen, className: "25春001班", email: "" };
                const script = document.createElement("script");
                script.id = callbackName;
                script.src = `${SCRIPT_URL}?action=register&callback=${callbackName}&data=${encodeURIComponent(JSON.stringify(newUserData))}`;
                document.body.appendChild(script);
            }
        }

        function loginAs(username) {
            currentUser = allUsersData[username];
            localStorage.setItem("kindness_user", username);
            document.getElementById("authSection").classList.add("hidden");
            document.getElementById("gameSection").classList.remove("hidden");
            document.getElementById("userStatus").classList.remove("hidden");
            
            document.getElementById("leaderboardSection").classList.remove("hidden");
            renderLeaderboardAndWorld(); 
            renderUserUI();
        }

        function renderUserUI() {
            document.getElementById("navNickname").innerText = `${currentUser.nickname} (${currentUser.gender})`;
            const displayScore = currentUser.score > 9999 ? 9999 : currentUser.score;
            document.getElementById("navScore").innerText = displayScore;

            const stage = getStageInfo(currentUser.score);
            document.getElementById("landStageVisual").innerHTML = `<img src="images/${stage.file}" alt="${stage.name}" class="h-44 w-auto object-contain mx-auto rounded-xl drop-shadow-md">`;
            
            // 🌟 放大主要家園狀態下的分數：高亮加粗
            document.getElementById("landLevelName").innerHTML = `${stage.name} (<span class="text-orange-600 font-black text-lg">${displayScore}</span> 分)`;

            const logContainer = document.getElementById("logContainer");
            if(!currentUser.logs || currentUser.logs.length === 0) {
                logContainer.innerHTML = `<p class="text-gray-400 text-center py-8">目前尚無行善紀錄。</p>`;
            } else {
                let html = "";
                for(let i = currentUser.logs.length - 1; i >= 0; i--) {
                    const item = currentUser.logs[i];
                    html += `
                        <div class="bg-slate-50 p-3 rounded-xl border-l-4 border-green-500 shadow-sm">
                            <p class="text-xs text-gray-400 font-semibold mb-1">📅 ${item.time}</p>
                            <p class="text-gray-700 font-medium"><span class="text-green-600 font-bold">[${item.type}]</span> ${item.desc}</p>
                        </div>
                    `;
                }
                logContainer.innerHTML = html;
            }
        }

        function renderLeaderboardAndWorld() {
            const worldContainer = document.getElementById("worldContainer");
            const leaderboardContainer = document.getElementById("leaderboardContainer");
            
            let worldHtml = ""; 
            let userList = [];
            
            for(let username in allUsersData) {
                const u = allUsersData[username]; 
                userList.push(u);
                const stage = getStageInfo(u.score);
                const uScore = u.score > 9999 ? 9999 : u.score;
                
                // 🌟 鄰居小卡片內的分數：放大字體大小 (text-sm)、使用鮮明飽滿的深綠色背景與大粗體字
                worldHtml += `
                    <div class="bg-slate-50 p-3 rounded-xl text-center border text-xs border-gray-100 shadow-sm flex flex-col justify-between items-center">
                        <img src="images/${stage.file}" class="w-16 h-16 object-contain mb-1 rounded-md drop-shadow-sm">
                        <p class="font-bold truncate w-full text-gray-700 mb-1">${u.nickname}</p>
                        <div class="mt-auto"><span class="bg-green-600 text-white font-black text-xs px-2 py-0.5 rounded-full shadow-sm">${uScore} 分</span></div>
                    </div>`;
            }
            worldContainer.innerHTML = worldHtml;

            userList.sort((a, b) => (b.score || 0) - (a.score || 0));
            let rankHtml = "";
            userList.slice(0, 10).forEach((u, idx) => {
                const medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : `第 ${idx+1} 名`;
                const uScore = u.score > 9999 ? 9999 : u.score;
                // 🌟 排行榜列表內的分數與名次：名次與名字放大，分數改用亮眼晴空藍，字級調大至 text-sm，並極度加粗 (font-black)
                rankHtml += `
                    <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded-xl text-xs font-medium shadow-2xs">
                        <span class="text-gray-700 font-bold text-sm">${medal} ${u.nickname}</span>
                        <span class="text-blue-600 font-black text-sm bg-blue-50 px-2 py-0.5 rounded-md border border-blue-100">${uScore} 分</span>
                    </div>`;
            });
            leaderboardContainer.innerHTML = rankHtml;
        }

        function submitKindness() {
            if(isSubmitting) return; 

            const desc = document.getElementById("kindnessDesc").value.trim();
            if(!desc) { alert("請寫下您的具體善行描述！"); return; }

            isSubmitting = true;
            const btnSubmit = document.getElementById("btnSubmitKindness");
            btnSubmit.disabled = true;
            btnSubmit.innerText = "正在傳送中...";

            const typeVal = document.querySelector('input[name="kindnessType"]:checked').value;
            
            let scoreVal = 2;
            if (typeVal === "廣論班上課") scoreVal = 2;
            else if (typeVal === "每日善行") scoreVal = 3;
            else if (typeVal === "誦經") scoreVal = 3;
            else if (typeVal === "聽音檔") scoreVal = 3;
            else if (typeVal === "觀功") scoreVal = 5;
            else if (typeVal === "念恩") scoreVal = 5;
            else if (typeVal === "當義工") scoreVal = 8;
            else if (typeVal === "參加法會") scoreVal = 8;

            const typeText = `${typeVal} +${scoreVal}分`;
            const now = new Date();
            const timeString = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            const logItem = { time: timeString, type: typeText, desc: desc };

            showGlobalStatus(true, "正在上傳功德至雲端...");

            const callbackName = "jsonpKindness_" + Date.now();
            window[callbackName] = function(data) {
                if(data.result === "success") {
                    alert("✨ 善行已成功記錄！功德無量！");
                    currentUser.score += scoreVal;
                    if(!currentUser.logs) currentUser.logs = [];
                    currentUser.logs.push(logItem);
                    document.getElementById("kindnessDesc").value = "";
                    showGlobalStatus(false);
                    
                    renderUserUI();
                    renderLeaderboardAndWorld();
                } else {
                    alert("紀錄失敗！");
                    showGlobalStatus(false);
                }
                
                isSubmitting = false;
                btnSubmit.disabled = false;
                btnSubmit.innerText = "送出善行，灌溉大地 ✨";

                document.getElementById(callbackName).remove();
                delete window[callbackName];
            };

            const payload = { username: currentUser.username, scoreVal: scoreVal, logItem: logItem };
            const script = document.createElement("script");
            script.id = callbackName;
            script.src = `${SCRIPT_URL}?action=addKindness&callback=${callbackName}&data=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        }

        function updateScoreHint(val) { document.getElementById("btnScoreHint").innerText = `+${val}`; }

        function showGlobalStatus(show, msg = "", iconHtml = null) {
            const statusBox = document.getElementById("globalStatus");
            const statusMsg = document.getElementById("statusMessage");
            const statusIcon = document.getElementById("statusIcon");
            if(show) {
                statusBox.classList.remove("hidden"); statusMsg.innerText = msg;
                if(iconHtml) statusIcon.innerHTML = `<span class="text-3xl">${iconHtml}</span>`;
                else statusIcon.innerHTML = `<div class="loading-spinner"></div>`;
            } else { statusBox.classList.add("hidden"); }
        }

        function logout() { localStorage.removeItem("kindness_user"); location.reload(); }
    </script>
</body>
</html>
