<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>善之大地 Land of Kindness</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3498db;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <header class="bg-green-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">🌱 善之大地 <span id="headerClassName" class="text-xs bg-green-700 px-2 py-1 rounded">載入中...</span></h1>
        <div id="userStatus" class="hidden text-sm flex items-center gap-3">
            <span id="navNickname" class="font-semibold"></span> (得分: <span id="navScore" class="text-yellow-300 font-bold">0</span>)
            <button id="btnSwitchTab" onclick="switchTab()" class="bg-blue-500 hover:bg-blue-600 text-xs px-2 py-1 rounded transition">修改基本資料</button>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-xs px-2 py-1 rounded transition">登出</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="globalStatus" class="bg-white p-6 rounded-xl shadow-md text-center my-8 max-w-md mx-auto">
            <div id="statusIcon" class="flex justify-center mb-3"><div class="loading-spinner"></div></div>
            <p id="statusMessage" class="text-gray-600 font-medium">正在連線至善之大地資料庫...</p>
        </div>

        <!-- 建立角色 / 登入區塊 -->
        <section id="authSection" class="hidden max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl my-8">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">建立角色 / 登入</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">使用者帳號 <span class="text-red-500">*</span></label>
                    <input type="text" id="username" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="請輸入英文或數字">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密碼 <span class="text-red-500">*</span></label>
                    <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="請輸入密碼">
                </div>
                
                <hr class="border-gray-200 my-4">
                <p class="text-xs text-amber-500 font-semibold text-center">💡 初次登入將自動註冊，請務必完整填寫以下創角資料：</p>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">遊戲暱稱</label>
                    <input type="text" id="nickname" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="例如：隨喜功德小行者">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">性別</label>
                        <select id="gender" class="w-full px-3 py-2 border rounded-lg outline-none">
                            <option value="師兄">師兄</option>
                            <option value="師姐">師姐</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">班級名稱</label>
                        <input type="text" id="className" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="例如：25春001班">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話</label>
                    <input type="tel" id="phone" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="例如：0912345678">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件 (Email)</label>
                    <input type="email" id="email" class="w-full px-3 py-2 border rounded-lg outline-none" placeholder="例如：kindness@example.com">
                </div>
                
                <button onclick="handleAuth()" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg shadow-md mt-2">
                    進入善之大地 🚀
                </button>
            </div>
        </section>

        <!-- 🏠 遊戲主要畫面區塊 -->
        <section id="gameSection" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6 my-4">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-md text-center">
                    <h3 class="text-lg font-bold text-gray-700 mb-2">我的善意家園</h3>
                    <div id="landStageVisual" class="text-6xl my-4">🌱</div>
                    <p class="text-sm text-gray-500">目前等級：<span id="landLevelName" class="font-bold text-green-600">功德幼苗</span></p>
                </div>

                <!-- ✍️ 修改後的全新八大積分選項區塊 -->
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h3 class="text-lg font-bold text-gray-700 mb-4">✍️ 每日造集資糧功德回報</h3>
                    
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4 text-center">
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="廣論班上課" checked onclick="updateScoreHint(2)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">📖</div>
                            <p class="font-medium text-xs">廣論班上課</p>
                            <p class="text-[10px] text-gray-400 font-bold">+2 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="每日善行" onclick="updateScoreHint(3)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">☀️</div>
                            <p class="font-medium text-xs">每日善行</p>
                            <p class="text-[10px] text-gray-400 font-bold">+3 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="誦經" onclick="updateScoreHint(3)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">🙏</div>
                            <p class="font-medium text-xs">誦經</p>
                            <p class="text-[10px] text-gray-400 font-bold">+3 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="聽音檔" onclick="updateScoreHint(3)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">🎧</div>
                            <p class="font-medium text-xs">聽音檔</p>
                            <p class="text-[10px] text-gray-400 font-bold">+3 分</p>
                        </label>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4 text-center">
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="觀功" onclick="updateScoreHint(5)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">🔍</div>
                            <p class="font-medium text-xs">觀功</p>
                            <p class="text-[10px] text-gray-400 font-bold">+5 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="念恩" onclick="updateScoreHint(5)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">❤️</div>
                            <p class="font-medium text-xs">念恩</p>
                            <p class="text-[10px] text-gray-400 font-bold">+5 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="當義工" onclick="updateScoreHint(8)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">🧡</div>
                            <p class="font-medium text-xs">當義工</p>
                            <p class="text-[10px] text-gray-400 font-bold">+8 分</p>
                        </label>
                        <label class="p-2 border rounded-xl hover:bg-green-50 cursor-pointer block relative">
                            <input type="radio" name="kindnessType" value="參加法會" onclick="updateScoreHint(8)" class="absolute top-2 left-2">
                            <div class="text-2xl mb-1">📿</div>
                            <p class="font-medium text-xs">參加法會</p>
                            <p class="text-[10px] text-gray-400 font-bold">+8 分</p>
                        </label>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-600 mb-1">功德迴向與具體描述</label>
                        <textarea id="kindnessDesc" rows="3" class="w-full px-3 py-2 border rounded-lg outline-none text-sm" placeholder="填寫今天造集了什麼善業..."></textarea>
                    </div>
                    <button onclick="submitKindness()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-lg shadow-md transition">
                        送出善行，灌溉大地 ✨ (<span id="btnScoreHint">+2</span>分)
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md flex flex-col max-h-[600px]">
                <h3 class="text-lg font-bold text-gray-700 mb-3">📜 善行歷史回顧日誌</h3>
                <div id="logContainer" class="space-y-3 overflow-y-auto flex-1 pr-1 text-sm">
                    <p class="text-gray-400 text-center py-8">目前尚無行善紀錄。</p>
                </div>
            </div>
        </section>

        <!-- 👤 個人資料修改區塊 -->
        <section id="profileSection" class="hidden max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl my-4">
            <h3 class="text-xl font-bold text-gray-800 mb-2">👤 行者基本資料</h3>
            <p class="text-xs text-gray-400 mb-6">您可以隨時檢視或修改您的個人資料，系統會自動同步回傳雲端。</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">使用者帳號 (無法修改)</label>
                    <input type="text" id="profileUsername" disabled class="w-full px-3 py-2 bg-slate-50 border rounded-lg text-gray-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">遊戲暱稱</label>
                    <input type="text" id="profileNickname" class="w-full px-3 py-2 border rounded-lg outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">性別</label>
                        <select id="profileGender" class="w-full px-3 py-2 border rounded-lg outline-none">
                            <option value="師兄">師兄</option>
                            <option value="師姐">師姐</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">班級名稱</label>
                        <input type="text" id="profileClassName" class="w-full px-3 py-2 border rounded-lg outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話</label>
                    <input type="tel" id="profilePhone" class="w-full px-3 py-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件 (Email)</label>
                    <input type="email" id="profileEmail" class="w-full px-3 py-2 border rounded-lg outline-none">
                </div>
                
                <div class="pt-2 flex gap-3">
                    <button onclick="switchTab('game')" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2.5 rounded-lg transition">
                        返回首頁
                    </button>
                    <button onclick="submitUpdateProfile()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-2.5 rounded-lg shadow-md transition">
                        儲存修改 💾
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBeHqFPnUEiRbkIF2U8j4NVWQ96nUDGLDGyFNicaR3AC54DH_EBzI8sKPddz8vulgJyQ/exec";
        
        let allUsersData = {};
        let currentUser = null;
        let currentActiveTab = "game";

        window.onload = function() {
            fetchDatabase();
        };

        // 🟢 修正點：加入隨清快取機制 (_nocache)，避免因為瀏覽器暫存拿不到最新的歷史紀錄
        function fetchDatabase(callbackAfterFetch = null) {
            showGlobalStatus(true, "正在同步雲端功德簿...");
            
            const callbackName = "jsonpCallback_" + Date.now();
            window[callbackName] = function(data) {
                if(data.result === "success") {
                    allUsersData = data.users || {};
                    showGlobalStatus(false);
                    
                    const savedUser = localStorage.getItem("kindness_user");
                    if(savedUser && allUsersData[savedUser]) {
                        currentUser = allUsersData[savedUser];
                        renderUserUI();
                        if(callbackAfterFetch) callbackAfterFetch();
                        
                        // 只有初次加載且不是在個人資料分頁時才顯示遊戲主頁
                        if(currentActiveTab === "game") {
                            document.getElementById("gameSection").classList.remove("hidden");
                            document.getElementById("userStatus").classList.remove("hidden");
                        }
                    } else {
                        document.getElementById("authSection").classList.remove("hidden");
                    }
                } else {
                    showGlobalStatus(true, "⚠️ 載入資料庫失敗，請重試！", "❌");
                }
                document.getElementById(callbackName).remove();
                delete window[callbackName];
            };

            const script = document.createElement("script");
            script.id = callbackName;
            script.src = `${SCRIPT_URL}?action=getAllUsers&callback=${callbackName}&_nocache=${Date.now()}`;
            document.body.appendChild(script);
        }

        function handleAuth() {
            const user = document.getElementById("username").value.trim().toLowerCase();
            const pass = document.getElementById("password").value.trim();
            const nick = document.getElementById("nickname").value.trim();
            const gen = document.getElementById("gender").value;
            const cls = document.getElementById("className").value.trim();
            const ph = document.getElementById("phone").value.trim();
            const em = document.getElementById("email").value.trim();

            if(!user || !pass) { alert("請填寫帳號與密碼！"); return; }

            if(allUsersData[user]) {
                if(allUsersData[user].password === pass) {
                    localStorage.setItem("kindness_user", user);
                    document.getElementById("authSection").classList.add("hidden");
                    fetchDatabase();
                } else {
                    alert("密碼錯誤！");
                }
            } else {
                if(!nick || !cls || !ph || !em) { 
                    alert("⚠️ 偵測到您是全新帳號！新創角色時，請務必完整填寫下方的「暱稱、班級、電話、Email」欄位！"); 
                    return; 
                }
                showGlobalStatus(true, "正在建立角色並寫入資料庫...");
                
                const callbackName = "jsonpRegister_" + Date.now();
                window[callbackName] = function(data) {
                    if(data.result === "success") {
                        alert("🎉 創角成功！歡迎來到善之大地！");
                        localStorage.setItem("kindness_user", user);
                        location.reload();
                    } else {
                        alert("註冊失敗：" + data.message);
                        showGlobalStatus(false);
                    }
                    document.getElementById(callbackName).remove();
                    delete window[callbackName];
                };

                const newUserData = { 
                    username: user, 
                    password: pass, 
                    nickname: nick, 
                    gender: gen, 
                    className: cls, 
                    phone: ph, 
                    email: em 
                };
                
                const script = document.createElement("script");
                script.id = callbackName;
                script.src = `${SCRIPT_URL}?action=register&callback=${callbackName}&data=${encodeURIComponent(JSON.stringify(newUserData))}`;
                document.body.appendChild(script);
            }
        }

        function renderUserUI() {
            document.getElementById("headerClassName").innerText = currentUser.className || "未設定班級";
            document.getElementById("navNickname").innerText = `${currentUser.nickname} (${currentUser.gender})`;
            document.getElementById("navScore").innerText = currentUser.score;

            let stage = "🌱"; let levelName = "功德幼苗 (0分+)"; const score = currentUser.score;
            if(score >= 150) { stage = "🏛️"; levelName = "終極庇護所・兜率內院 (150分+)"; }
            else if(score >= 80) { stage = "🕌"; levelName = "天空大梵寺 (80分+)"; }
            else if(score >= 50) { stage = "🏰"; levelName = "行善黃金古堡 (50分+)"; }
            else if(score >= 20) { stage = "🏡"; levelName = "福報溫馨別墅 (20分+)"; }
            else if(score >= 10)  { stage = "🌿"; levelName = "善意茂盛灌木 (10分+)"; }

            document.getElementById("landStageVisual").innerText = stage;
            document.getElementById("landLevelName").innerText = levelName;

            const logContainer = document.getElementById("logContainer");
            if(!currentUser.logs || currentUser.logs.length === 0) {
                logContainer.innerHTML = `<p class="text-gray-400 text-center py-8">目前尚無行善紀錄。</p>`;
            } else {
                let html = "";
                // 由新到舊排序顯示
                for(let i = currentUser.logs.length - 1; i >= 0; i--) {
                    const item = currentUser.logs[i];
                    html += `
                        <div class="bg-slate-50 p-3 rounded-xl border-l-4 border-green-500 shadow-sm">
                            <p class="text-xs text-gray-400 font-semibold mb-1">📅 ${item.time}</p>
                            <p class="text-gray-700 font-medium"><span class="text-green-600 font-bold">[${item.type}]</span> ${item.desc}</p>
                        </div>
                    `;
                }
                logContainer.innerHTML = html;
            }
            setupProfileInputs();
        }

        function setupProfileInputs() {
            if(!currentUser) return;
            document.getElementById("profileUsername").value = currentUser.username || "";
            document.getElementById("profileNickname").value = currentUser.nickname || "";
            document.getElementById("profileGender").value = currentUser.gender || "師兄";
            document.getElementById("profileClassName").value = currentUser.className || "";
            document.getElementById("profilePhone").value = currentUser.phone || "";
            document.getElementById("profileEmail").value = currentUser.email || "";
        }

        function switchTab(forceTab = null) {
            const gameSec = document.getElementById("gameSection");
            const profSec = document.getElementById("profileSection");
            const btn = document.getElementById("btnSwitchTab");

            let targetTab = forceTab;
            if(!targetTab) {
                targetTab = (currentActiveTab === "game") ? "profile" : "game";
            }

            if(targetTab === "profile") {
                gameSec.classList.add("hidden");
                profSec.classList.remove("hidden");
                btn.innerText = "返回主頁面板";
                btn.className = "bg-gray-500 hover:bg-gray-600 text-xs px-2 py-1 rounded transition";
                currentActiveTab = "profile";
            } else {
                gameSec.classList.remove("hidden");
                profSec.classList.add("hidden");
                btn.innerText = "修改基本資料";
                btn.className = "bg-blue-500 hover:bg-blue-600 text-xs px-2 py-1 rounded transition";
                currentActiveTab = "game";
            }
        }

        function submitUpdateProfile() {
            const newNick = document.getElementById("profileNickname").value.trim();
            const newGen = document.getElementById("profileGender").value;
            const newCls = document.getElementById("profileClassName").value.trim();
            const newPh = document.getElementById("profilePhone").value.trim();
            const newEm = document.getElementById("profileEmail").value.trim();

            if(!newNick || !newCls || !newPh || !newEm) { alert("所有資料欄位皆不能留空！"); return; }

            showGlobalStatus(true, "正在同步更新雲端基本資料...");

            const updatedProfile = {
                username: currentUser.username,
                nickname: newNick,
                gender: newGen,
                className: newCls,
                phone: newPh,
                email: newEm
            };

            const callbackName = "jsonpUpdateProfile_" + Date.now();
            window[callbackName] = function(data) {
                if(data.result === "success") {
                    alert("✨ 個人基本資料修改成功！");
                    fetchDatabase(function() {
                        switchTab('game');
                    });
                } else {
                    alert("更新失敗：" + data.message);
                    showGlobalStatus(false);
                }
                document.getElementById(callbackName).remove();
                delete window[callbackName];
            };

            const script = document.createElement("script");
            script.id = callbackName;
            script.src = `${SCRIPT_URL}?action=register&callback=${callbackName}&data=${encodeURIComponent(JSON.stringify(updatedProfile))}`;
            document.body.appendChild(script);
        }

        // 🟢 修正點：送出紀錄後，除了在前端立即累加外，也強制透過 fetchDatabase 向雲端重新抓一次最正確、最齊全的歷史紀錄
        function submitKindness() {
            const desc = document.getElementById("kindnessDesc").value.trim();
            if(!desc) { alert("請寫下您的具體善行或心得描述！"); return; }

            const typeVal = document.querySelector('input[name="kindnessType"]:checked').value;
            
            // 根據全新要求動態指派分數
            let scoreVal = 1;
            if (typeVal === "廣論班上課") scoreVal = 2;
            else if (typeVal === "每日善行") scoreVal = 3;
            else if (typeVal === "誦經") scoreVal = 3;
            else if (typeVal === "聽音檔") scoreVal = 3;
            else if (typeVal === "觀功") scoreVal = 5;
            else if (typeVal === "念恩") scoreVal = 5;
            else if (typeVal === "當義工") scoreVal = 8;
            else if (typeVal === "參加法會") scoreVal = 8;

            const typeText = `${typeVal} +${scoreVal}分`;

            const now = new Date();
            const timeString = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            const logItem = { time: timeString, type: typeText, desc: desc };
            showGlobalStatus(true, "正在上傳功德至雲端...");

            const callbackName = "jsonpKindness_" + Date.now();
            window[callbackName] = function(data) {
                if(data.result === "success") {
                    alert("✨ 善行已成功記錄！功德無量！");
                    document.getElementById("kindnessDesc").value = "";
                    // 關鍵修正：上傳完成後，立刻再次重新同步完整資料庫，保證資料永不漏接
                    fetchDatabase();
                } else {
                    alert("紀錄失敗，請檢查網路連線！");
                    showGlobalStatus(false);
                }
                document.getElementById(callbackName).remove();
                delete window[callbackName];
            };

            const payload = { username: currentUser.username, scoreVal: scoreVal, logItem: logItem };
            const script = document.createElement("script");
            script.id = callbackName;
            script.src = `${SCRIPT_URL}?action=addKindness&callback=${callbackName}&data=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        }

        function updateScoreHint(val) { document.getElementById("btnScoreHint").innerText = `+${val}`; }
        function showGlobalStatus(show, msg = "", iconHtml = null) {
            const statusBox = document.getElementById("globalStatus");
            const statusMsg = document.getElementById("statusMessage");
            const statusIcon = document.getElementById("statusIcon");
            if(show) {
                statusBox.classList.remove("hidden"); statusMsg.innerText = msg;
                if(iconHtml) statusIcon.innerHTML = `<span class="text-3xl">${iconHtml}</span>`;
                else statusIcon.innerHTML = `<div class="loading-spinner"></div>`;
            } else { statusBox.classList.add("hidden"); }
        }
        function logout() { localStorage.removeItem("kindness_user"); location.reload(); }
    </script>
</body>
</html>
